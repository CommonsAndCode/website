server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Handle trailing slashes and clean URLs
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Security headers (must be repeated in each location that sets its own
    # add_header — nginx does not inherit add_header across locations)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.commons-and-code.eu 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://*.commons-and-code.eu 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.commons-and-code.eu; frame-src https://*.commons-and-code.eu; base-uri 'self'; form-action 'self' https://*.commons-and-code.eu;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Cache static assets (repeat security headers — see note above)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.commons-and-code.eu 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://*.commons-and-code.eu 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.commons-and-code.eu; frame-src https://*.commons-and-code.eu; base-uri 'self'; form-action 'self' https://*.commons-and-code.eu;" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Custom error pages
    error_page 404 /404.html;
}
